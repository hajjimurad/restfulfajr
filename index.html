<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Restful Fajr — sleep-aligned prayer times</title>
<meta name="description" content="Plan your sleep around Maghrib, Isha and Fajr so you wake in your lightest sleep and pray Fajr well-rested.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg1:#e7f6ec; --bg2:#e2f5f0; --bg3:#eef8e9;
    --ink:#263b31; --ink-soft:#5c7266; --line:#d9ebe0;
    --card:#ffffff; --accent:#4fae83; --accent-deep:#2f8f63;
    --sage:#bfe6cf; --mint:#c7efdc; --teal:#b8e6e0; --leaf:#d4edb8; --gold:#f3e2ac;
    --rec:#5fce97; --rec-ink:#0f4d31; --warn:#b45309;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Inter,system-ui,sans-serif;color:var(--ink);
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));min-height:100vh;padding:26px 16px 60px}
  .wire{max-width:900px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .app-title{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:0 0 2px}
  .app-sub{color:var(--ink-soft);margin:0 0 22px;font-size:14px}
  .lang-toggle{flex:none;display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang-toggle button{background:transparent;border:none;border-radius:999px;padding:5px 11px;font-size:12px;font-weight:800;color:var(--ink-soft);cursor:pointer}
  .lang-toggle button.active{background:var(--accent);color:#fff}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 22px;margin-bottom:18px;box-shadow:0 12px 30px -20px rgba(28,80,55,.4)}
  .step{display:inline-block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent-deep);margin-bottom:14px}

  .summary{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:12px 16px;margin-bottom:18px;box-shadow:0 12px 30px -22px rgba(28,80,55,.4)}
  .chip{background:#eef8f1;border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:13px;font-weight:600;color:var(--accent-deep)}
  .chip span{color:var(--ink-soft);font-weight:500}
  .spacer{flex:1}
  button{font-family:inherit}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer}
  .btn:hover{background:var(--accent-deep)}
  .btn.ghost{background:#eef8f1;color:var(--accent-deep);border:1px solid var(--line)}

  .prayer-strip{display:flex;gap:12px;flex-wrap:wrap}
  .prayer{flex:1 1 90px;text-align:center;border-radius:14px;padding:14px 8px}
  .prayer:nth-child(1){background:var(--leaf)} .prayer:nth-child(2){background:var(--sage)}
  .prayer:nth-child(3){background:var(--teal)} .prayer:nth-child(4){background:var(--gold)}
  .prayer .t{font-size:20px;font-weight:800}
  .prayer .n{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-top:2px}

  .plans{display:flex;gap:16px;flex-wrap:wrap}
  .plan{flex:1 1 300px;background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:18px;position:relative;box-shadow:0 12px 30px -22px rgba(28,80,55,.45)}
  .plan-tabs{display:none;gap:8px;margin:12px 0}
  .ptab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:#eef8f1;border:1px solid var(--line);border-radius:11px;padding:10px;font-size:14px;font-weight:700;color:var(--ink-soft);cursor:pointer}
  .ptab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tab-rec{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;background:var(--rec);color:var(--rec-ink);padding:2px 8px;border-radius:20px}
  @media (max-width:640px){
    .plan-tabs{display:flex}
    .plans{display:block}
    .plan{display:none}
    .plan.active-tab{display:block}
    .plan .badge{display:none}
  }
  .plan.rec{border-color:var(--rec);background:linear-gradient(180deg,#f2fcf6,#fff 40%)}
  .plan.disabled{opacity:.6}
  .badge{position:absolute;top:-12px;left:16px;background:var(--rec);color:var(--rec-ink);font-size:11px;font-weight:800;padding:4px 11px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
  .plan h3{margin:2px 0 6px;font-size:17px}
  .big{font-size:23px;font-weight:800;margin:8px 0 2px;color:var(--accent-deep)}
  .timeline{height:32px;border-radius:9px;margin:12px 0 4px;background:linear-gradient(90deg,#2f8f63,#5fae83 45%,#a9d0a0 70%,#f3e2ac)}
  .tl-label{font-size:10px;color:var(--ink-soft);display:flex;justify-content:space-between}
  .metric{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13.5px;color:var(--ink-soft)}
  .metric:last-child{border-bottom:none}
  .metric b{color:var(--ink);font-weight:700;text-align:right}
  .metric.warn b{color:var(--warn)}
  .metric.good b{color:var(--accent-deep)}
  .tips{margin:0;padding-left:18px}
  .tips li{margin-bottom:9px;line-height:1.5;font-size:14px}
  .tips b{color:var(--accent-deep)}

  .row{display:flex;gap:14px;flex-wrap:wrap}
  .fld{flex:1 1 180px}
  .fld label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
  .inp,select{width:100%;background:#f1f9f4;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:14px;color:var(--ink)}
  .loc-row{display:flex;gap:8px}
  .loc-row .inp{flex:1}
  details{margin-top:14px}
  summary{cursor:pointer;font-size:13px;color:var(--accent-deep);font-weight:600}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:5px}
  .pverdict{display:flex;align-items:center;gap:8px;border-radius:11px;padding:9px 12px;margin:2px 0 12px;font-size:13.5px;font-weight:700;border:1px solid}
  .pverdict.good{background:#eafaf0;border-color:#8fdcb0;color:#12633c}
  .pverdict.ok{background:#eafaf0;border-color:#8fdcb0;color:#12633c}
  .pverdict.short{background:#fdeeea;border-color:#f2bfa8;color:#8a3a1e}
  .theory summary{font-size:14px;font-weight:700;color:var(--accent-deep)}
  .theory p{font-size:13.5px;line-height:1.6;color:var(--ink-soft);margin:10px 0}
  .theory b{color:var(--ink)}
  .error{background:#fdecec;border:1px solid #f4c7c7;color:#8a2b2b;border-radius:14px;padding:16px 18px;margin-bottom:18px}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

  <p class="app-sub" id="appFoot" style="margin-top:26px;font-size:12px;opacity:.8"></p>
</div>

        "<p><b>Почему стоит ложиться сразу после Иши.</b> Поскольку глубокий сон сосредоточен в начале ночи, чем раньше она начинается, тем больше восстановительного сна вы накопите до подъёма на Фаджр. Мы прибавляем время на молитву и сборы плюс время засыпания, затем отсчитываем целые циклы до самого раннего подъёма в окне Фаджра, дающего достаточно отдыха.</p>" +
        "<p><b>Зачем нужен разделённый план.</b> Иша действительна вплоть до Фаджра. Когда Иша поздно (частая ситуация на высоких широтах летом), бодрствование ради неё тратит лучшие часы глубокого сна. Поэтому в разделённом плане вы молитесь Магриб, спите, затем встаёте <b>минимум за 30 минут до Фаджра</b> — достаточно, чтобы помолиться Ишу, а затем Фаджр — перед необязательным вторым сном. Вы меняете один длинный блок на более раннюю и длинную ночь.</p>" +
        "<p><b>Непрерывный сон лучше разбитого.</b> Один непрерывный блок сна восстанавливает лучше, чем те же часы по частям, поэтому при возможности одиночный план, достигающий цели по циклам, предпочтительнее разделённого.</p>" +
        "<p><b>Утренний свет важен.</b> Время восхода показано, чтобы вы могли получить дневной свет вскоре после Фаджра — яркий утренний свет настраивает циркадные ритмы и облегчает засыпание следующей ночью.</p>" +
        "<p style=\"opacity:.8\">Времена молитв берутся из API AlAdhan по выбранному методу расчёта и правилу для высоких широт. Это общая информация о гигиене сна, а не медицинский или религиозный совет.</p>"
    }
  };

  function detectLang() {
    try { var s = localStorage.getItem(LANG_KEY); if (s === "en" || s === "ru") return s; } catch (e) {}
    return (navigator.language || "").toLowerCase().indexOf("ru") === 0 ? "ru" : "en";
  }
  var LANG = detectLang();

  function tr(key, params) {
    var s = (I18N[LANG] && I18N[LANG][key]);
    if (s == null) s = I18N.en[key];
    if (s == null) return key;
    if (params) for (var k in params) s = s.split("{" + k + "}").join(params[k]);
    return s;
  }
  function durL(min) {
    min = Math.max(0, Math.round(min));
    var h = Math.floor(min / 60), m = min % 60;
    var H = LANG === "ru" ? "ч" : "h", M = LANG === "ru" ? "м" : "m";
    if (h && m) return h + H + " " + m + M;
    if (h) return h + H;
    return m + M;
  }

  var METHODS = [
    { id: 3, name: "Muslim World League" },
    { id: 2, name: "ISNA (North America)" },
    { id: 5, name: "Egyptian General Authority" },
    { id: 4, name: "Umm al-Qura (Makkah)" },
    { id: 1, name: "Univ. of Karachi" },
    { id: 8, name: "Gulf Region" },
    { id: 9, name: "Kuwait" },
    { id: 10, name: "Qatar" },
    { id: 11, name: "Singapore" },
    { id: 12, name: "France (UOIF)" },
    { id: 13, name: "Diyanet (Turkey)" },
    { id: 7, name: "Tehran" },
    { id: 14, name: "Russia" }
  ];
  var LAT_METHODS = [
    { id: 3, key: "latAngle" },
    { id: 1, key: "latMidnight" },
    { id: 2, key: "latSeventh" }
  ];

  var DEFAULTS = {
    locInput: "", locMode: "", lat: null, lng: null, address: "",
    workWake: "07:00", buffer: 30, method: 3, latMethod: 3,
    cycle: 90, latency: 15, target: 5, splitBuffer: 30, preSleep: 30
  };

  function loadSettings() {
    try {
      var raw = localStorage.getItem(KEY);
      if (!raw) return null;
      return Object.assign({}, DEFAULTS, JSON.parse(raw));
    } catch (e) { return null; }
  }
  function saveSettings(s) { localStorage.setItem(KEY, JSON.stringify(s)); }

  function esc(s) { return String(s).replace(/[&<>"]/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }
  function methodName(id) { for (var i=0;i<METHODS.length;i++) if (METHODS[i].id==id) return METHODS[i].name; return "MWL"; }
  function latName(id) { for (var i=0;i<LAT_METHODS.length;i++) if (LAT_METHODS[i].id==id) return tr(LAT_METHODS[i].key); return tr("latAngle"); }

  function pad(n){ return (n<10?"0":"")+n; }
  function ddmmyyyy(d){ return pad(d.getDate())+"-"+pad(d.getMonth()+1)+"-"+d.getFullYear(); }

  // ---- view state -----------------------------------------------------------
  var mode = "result", settingsFirstRun = false, cache = null;

  function rerender() {
    if (mode === "settings") renderSettings(settingsFirstRun);
    else if (cache) showResult();
    else renderResult();
  }

  // ---- settings view --------------------------------------------------------
  function renderSettings(firstRun) {
    mode = "settings"; settingsFirstRun = firstRun;
    var s = loadSettings() || Object.assign({}, DEFAULTS);
    var methodOpts = METHODS.map(function (m) {
      return '<option value="'+m.id+'"'+(m.id==s.method?" selected":"")+'>'+esc(m.name)+'</option>'; }).join("");
    var latOpts = LAT_METHODS.map(function (m) {
      return '<option value="'+m.id+'"'+(m.id==s.latMethod?" selected":"")+'>'+esc(tr(m.key))+'</option>'; }).join("");

    view.innerHTML =
      (firstRun ? "" :
        '<div style="margin-bottom:14px"><button class="btn ghost" id="backBtn">'+esc(tr("back"))+'</button></div>') +
      '<div class="card">' +
        '<span class="step">'+esc(tr("settingsTitle"))+'</span>' +
        '<div class="row">' +
          '<div class="fld"><label>'+esc(tr("location"))+'</label>' +
            '<div class="loc-row">' +
              '<input class="inp" id="loc" placeholder="'+esc(tr("locPlaceholder"))+'" value="'+esc(s.locInput)+'">' +
              '<button class="btn" id="geoBtn" type="button">📍</button>' +
            '</div>' +
            '<div class="hint" id="locHint">'+esc(tr("locHint"))+'</div>' +
          '</div>' +
          '<div class="fld"><label>'+esc(tr("workWake"))+'</label><input class="inp" id="wake" type="time" value="'+esc(s.workWake)+'"></div>' +
          '<div class="fld"><label>'+esc(tr("buffer"))+'</label><input class="inp" id="buffer" type="number" min="0" max="180" step="5" value="'+esc(s.buffer)+'"></div>' +
        '</div>' +
        '<div class="row" style="margin-top:12px">' +
          '<div class="fld"><label>'+esc(tr("method"))+'</label><select id="method">'+methodOpts+'</select></div>' +
          '<div class="fld"><label>'+esc(tr("latRule"))+'</label><select id="latMethod">'+latOpts+'</select></div>' +
        '</div>' +
        '<details><summary>'+esc(tr("advanced"))+'</summary>' +
          '<div class="row" style="margin-top:12px">' +
            '<div class="fld"><label>'+esc(tr("cycle"))+'</label><input class="inp" id="cycle" type="number" min="60" max="120" step="5" value="'+esc(s.cycle)+'"></div>' +
            '<div class="fld"><label>'+esc(tr("latency"))+'</label><input class="inp" id="latency" type="number" min="0" max="60" step="5" value="'+esc(s.latency)+'"></div>' +
            '<div class="fld"><label>'+esc(tr("target"))+'</label><input class="inp" id="target" type="number" min="3" max="7" step="1" value="'+esc(s.target)+'"></div>' +
          '</div>' +
          '<div class="row" style="margin-top:12px">' +
            '<div class="fld"><label>'+esc(tr("preSleep"))+'</label><input class="inp" id="preSleep" type="number" min="0" max="90" step="5" value="'+esc(s.preSleep)+'"></div>' +
          '</div>' +
          '<div class="hint">'+esc(tr("advHint", { n: s.splitBuffer }))+'</div>' +
        '</details>' +
        '<div style="margin-top:16px"><button class="btn" id="saveBtn">'+esc(tr("save"))+'</button></div>' +
      '</div>';

    document.getElementById("geoBtn").onclick = function () {
      var hint = document.getElementById("locHint");
      if (!navigator.geolocation) { hint.textContent = tr("geoNA"); return; }
      hint.textContent = tr("geoLocating");
      navigator.geolocation.getCurrentPosition(function (pos) {
        var v = pos.coords.latitude.toFixed(4) + "," + pos.coords.longitude.toFixed(4);
        document.getElementById("loc").value = v;
        hint.textContent = tr("geoGot", { v: v });
      }, function () {
        hint.textContent = tr("geoDenied");
      });
    };

    if (!firstRun) document.getElementById("backBtn").onclick = renderResult;

    document.getElementById("saveBtn").onclick = function () {
      var locInput = document.getElementById("loc").value.trim();
      if (!locInput) { document.getElementById("locHint").textContent = tr("locRequired"); return; }
      var coord = locInput.match(/^\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*$/);
      var next = {
        locInput: locInput,
        locMode: coord ? "coords" : "address",
        lat: coord ? parseFloat(coord[1]) : null,
        lng: coord ? parseFloat(coord[2]) : null,
        address: coord ? "" : locInput,
        workWake: document.getElementById("wake").value || "07:00",
        buffer: clampNum("buffer", 30, 0, 180),
        method: parseInt(document.getElementById("method").value, 10),
        latMethod: parseInt(document.getElementById("latMethod").value, 10),
        cycle: clampNum("cycle", 90, 60, 120),
        latency: clampNum("latency", 15, 0, 60),
        target: clampNum("target", 5, 3, 7),
        preSleep: clampNum("preSleep", 30, 0, 90),
        splitBuffer: 30
      };
      cache = null;
      saveSettings(next);
      renderResult();
    };
  }

  function clampNum(id, def, lo, hi) {
    var v = parseInt(document.getElementById(id).value, 10);
    if (isNaN(v)) v = def;
    return Math.max(lo, Math.min(hi, v));
  }

  // ---- fetch ----------------------------------------------------------------
  function endpoint(s, dateStr) {
    var base = "https://api.aladhan.com/v1/";
    var common = "method=" + s.method + "&school=0&latitudeAdjustmentMethod=" + s.latMethod;
    if (s.locMode === "coords") {
      return base + "timings/" + dateStr + "?latitude=" + s.lat + "&longitude=" + s.lng + "&" + common;
    }
    return base + "timingsByAddress/" + dateStr + "?address=" + encodeURIComponent(s.address) + "&" + common;
  }

  function fetchDay(s, date) {
    return fetch(endpoint(s, ddmmyyyy(date))).then(function (r) {
      if (!r.ok) throw new Error("AlAdhan HTTP " + r.status);
      return r.json();
    }).then(function (j) {
      if (!j || j.code !== 200 || !j.data || !j.data.timings) throw new Error("Unexpected API response");
      return j.data;
    });
  }

  function fetchTimings(s) {
    var today = new Date();
    var tomorrow = new Date(today.getTime() + 86400000);
    return Promise.all([fetchDay(s, today), fetchDay(s, tomorrow)]).then(function (days) {
      var d0 = days[0], d1 = days[1];
      var raw = {
        maghrib: d0.timings.Maghrib, isha: d0.timings.Isha,
        fajr: d1.timings.Fajr, sunrise: d1.timings.Sunrise
      };
      [raw.maghrib, raw.isha, raw.fajr, raw.sunrise].forEach(function (v) {
        if (isNaN(Sleep.toMin(v))) throw new Error("twilight");
      });
      var place = (d0.meta && d0.meta.timezone) ? d0.meta.timezone.split("/").pop().replace(/_/g, " ") : "";
      if (s.locMode === "address") place = s.address;
      return { raw: raw, place: place, readable: d1.date && d1.date.readable };
    });
  }

  // ---- result view ----------------------------------------------------------
  function renderResult() {
    mode = "result";
    var s = loadSettings();
    if (!s || !s.locInput) { renderSettings(true); return; }

    view.innerHTML = summaryBar(s) + '<div class="card"><span class="spin"></span>' + esc(tr("loading")) + '</div>';
    wireSummary();

    fetchTimings(s).then(function (data) {
      cache = { s: s, data: data, r: Sleep.plan(data.raw, s) };
      showResult();
    }).catch(function (err) {
      cache = null;
      var msg = err && err.message === "twilight"
        ? (LANG === "ru" ? "Времена молитв недоступны для этого места/метода (белые ночи?). Попробуйте другое правило для высоких широт."
                         : "Prayer times unavailable for this location/method (persistent twilight?). Try a different high-latitude rule.")
        : (LANG === "ru" ? "Проблема с сетью или API. Попробуйте ещё раз." : "Network or API problem. Please try again.");
      view.innerHTML = summaryBar(s) +
        '<div class="error"><b>' + esc(tr("errTitle")) + '</b><br>' + esc(msg) +
        '<div style="margin-top:12px"><button class="btn" id="retryBtn">' + esc(tr("retry")) + '</button> ' +
        '<button class="btn ghost" id="editBtn2">' + esc(tr("editShort")) + '</button></div></div>';
      wireSummary();
      document.getElementById("retryBtn").onclick = renderResult;
      document.getElementById("editBtn2").onclick = function () { renderSettings(false); };
    });
  }

  function showResult() {
    view.innerHTML = summaryBar(cache.s) + resultBody(cache.s, cache.data, cache.r);
    wireSummary();
    wireTabs();
  }

  function summaryBar(s) {
    return '<div class="summary">' +
      '<span class="chip">📍 <span>' + esc(s.locInput) + '</span></span>' +
      '<span class="chip">⏰ ' + esc(tr("chipWake")) + ' <span>' + esc(s.workWake) + '</span></span>' +
      '<span class="chip">👪 <span>' + esc(s.buffer) + (LANG === "ru" ? " мин" : "m") + '</span></span>' +
      '<span class="chip">🕌 <span>' + esc(methodName(s.method)) + ' · ' + esc(latName(s.latMethod)) + '</span></span>' +
      '<span class="spacer"></span>' +
      '<button class="btn" id="editBtn">' + esc(tr("edit")) + '</button>' +
      '</div>';
  }
  function wireSummary() {
    var b = document.getElementById("editBtn");
    if (b) b.onclick = function () { renderSettings(false); };
  }

  function wireTabs() {
    var tabs = [].slice.call(document.querySelectorAll(".ptab"));
    var plans = [].slice.call(document.querySelectorAll(".plan[data-plan]"));
    tabs.forEach(function (tb) {
      tb.onclick = function () {
        var idx = tb.getAttribute("data-target");
        tabs.forEach(function (x) { x.classList.toggle("active", x === tb); });
        plans.forEach(function (p) { p.classList.toggle("active-tab", p.getAttribute("data-plan") === idx); });
      };
    });
  }

  function metric(label, val, cls) {
    return '<div class="metric ' + (cls || "") + '"><span>' + label + '</span><b>' + val + '</b></div>';
  }

  function verdictText(vd) {
    if (vd.level === "good") return { head: tr("vGoodHead"), sub: tr("vGoodShort", { cycles: vd.mainCycles, main: durL(vd.mainSleep) }) };
    if (vd.level === "ok") return { head: tr("vOkHead"), sub: tr("vOkShort", { total: durL(vd.totalSleep) }) };
    return { head: tr("vShortHead"), sub: tr("vShortShort", { total: durL(vd.totalSleep), cycles: vd.mainCycles }) };
  }

  function tipText(tp) {
    switch (tp.code) {
      case "splitRecommended": return tr("tipSplitRecommended", { isha: Sleep.fmt(tp.isha) });
      case "afterIshaFull": return tr("tipAfterIshaFull", { target: tp.target, isha: Sleep.fmt(tp.isha) });
      case "underTarget": return tr("tipUnderTarget", { cycles: tp.cycles, main: durL(tp.mainSleep), target: tp.target, deficit: durL(tp.deficitMin) });
      case "splitBuffer": return tr("tipSplitBuffer", { wake: Sleep.fmt(tp.wake), buffer: durL(tp.buffer), fajr: Sleep.fmt(tp.fajr) });
      case "sunrise": return tr("tipSunrise", { sunrise: Sleep.fmt(tp.sunrise) });
    }
    return "";
  }

  function resultBody(s, data, r) {
    var f = Sleep.fmt, t = r.timeline;
    var a = r.afterIsha, b = r.split;
    var recA = r.recommended === "afterIsha";
    var recB = r.recommended === "split";
    var VICON = { good: "✅", ok: "🌗", short: "⚠️" };
    function pv(vd) {
      if (!vd) return "";
      var vt = verdictText(vd);
      return '<div class="pverdict ' + vd.level + '">' + (VICON[vd.level] || "🌙") +
        ' <span>' + esc(vt.head) + ' · ' + esc(vt.sub) + '</span></div>';
    }

    var strip =
      '<div class="card"><span class="step">' + esc(tr("tonightPrefix") + (data.place || "")) +
        (data.readable ? ' · ' + esc(data.readable) : '') + '</span>' +
      '<div class="prayer-strip">' +
        prayer(data.raw.maghrib, tr("pMaghrib")) + prayer(data.raw.isha, tr("pIsha")) +
        prayer(data.raw.fajr, tr("pFajr")) + prayer(data.raw.sunrise, tr("pSunrise")) +
      '</div></div>';

    var activeIdx = recB ? 1 : 0;

    var aCard =
      '<div class="plan' + (recA ? ' rec' : '') + (activeIdx === 0 ? ' active-tab' : '') + '" data-plan="0">' +
        (recA ? '<span class="badge">' + esc(tr("recommended")) + '</span>' : '') +
        '<h3>' + esc(tr("planAh3")) + '</h3>' +
        pv(a.verdict) +
        '<div class="big">' + f(a.bedtime) + ' → ' + f(a.wake) + '</div>' +
        '<div class="timeline"></div>' +
        '<div class="tl-label"><span>' + esc(tr("tlBed", { x: f(a.bedtime) })) + '</span><span>' + esc(tr("tlFajrWake", { x: f(a.wake) })) + '</span></div>' +
        metric(esc(tr("mGoSleep")), f(a.bedtime)) +
        metric(esc(tr("mFajrWake")), f(a.wake)) +
        metric(esc(tr("mFullCycles")), a.cycles + " · " + durL(a.mainSleep), a.underTarget ? "warn" : "good") +
        metric(esc(tr("mDoneBy")), f(a.doneBy) + (a.doneBy > t.W ? esc(tr("afterWork")) : ""), a.doneBy <= t.W ? "good" : "warn") +
        (a.secondSleep > 0 ? metric(esc(tr("mSleepAgain")), f(a.doneBy) + " → " + f(t.W) + " (" + durL(a.secondSleep) + ")") : "") +
      '</div>';

    var bCard;
    if (!b.viable) {
      bCard = '<div class="plan disabled' + (activeIdx === 1 ? ' active-tab' : '') + '" data-plan="1"><h3>' + esc(tr("planBh3")) + '</h3>' +
        '<p style="color:var(--ink-soft);font-size:14px;margin-top:10px">' +
        esc(tr("splitDisabled", { isha: f(t.I), fajr: f(t.F), n: s.splitBuffer })) + '</p></div>';
    } else {
      var secondStart = t.F + s.buffer;
      bCard =
        '<div class="plan' + (recB ? ' rec' : '') + (activeIdx === 1 ? ' active-tab' : '') + '" data-plan="1">' +
          (recB ? '<span class="badge">' + esc(tr("recommended")) + '</span>' : '') +
          '<h3>' + esc(tr("planBh3")) + '</h3>' +
          pv(b.verdict) +
          '<div class="big">' + f(b.bedtime) + ' → ' + f(b.wake) + '</div>' +
          '<div class="timeline"></div>' +
          '<div class="tl-label"><span>' + esc(tr("tlBed", { x: f(b.bedtime) })) + '</span><span>' + esc(tr("tlWindow")) + '</span></div>' +
          metric(esc(tr("mGoSleep")), f(b.bedtime)) +
          metric(esc(tr("mWakeIsha")), f(b.wake)) +
          metric(esc(tr("mBufferFajr")), esc(tr("mBufferVal", { dur: durL(b.buffer), n: s.splitBuffer })), "warn") +
          metric(esc(tr("mThenFajr")), f(b.fajr), "good") +
          metric(esc(tr("mFirstBlock")), b.cycles + " · " + durL(b.mainSleep), b.cycles < s.target ? "warn" : "good") +
          (b.secondSleep > 0 ? metric(esc(tr("mSleepAgain")), f(secondStart) + " → " + f(t.W) + " (" + durL(b.secondSleep) + ")") : "") +
        '</div>';
    }

    var recPill = '<span class="tab-rec">' + esc(tr("recommended")) + '</span>';
    var tabs = '<div class="plan-tabs">' +
      '<button class="ptab' + (activeIdx === 0 ? ' active' : '') + '" data-target="0"><span>' + esc(tr("tabIsha")) + '</span>' + (recA ? recPill : '') + '</button>' +
      '<button class="ptab' + (activeIdx === 1 ? ' active' : '') + '" data-target="1"><span>' + esc(tr("tabMaghrib")) + '</span>' + (recB ? recPill : '') + '</button>' +
      '</div>';
    var plans = '<span class="step" style="margin-left:4px">' + esc(tr("twoPlans")) + '</span>' +
      tabs + '<div class="plans" style="margin-top:12px">' + aCard + bCard + '</div>';

    var tips = '<div class="card" style="margin-top:20px"><span class="step">' + esc(tr("tipsTitle")) + '</span>' +
      '<ul class="tips">' + r.tips.map(function (tp) { return '<li>' + esc(tipText(tp)) + '</li>'; }).join("") + '</ul></div>';

    return strip + plans + tips + theoryCard();
  }

  function theoryCard() {
    return '<div class="card theory" style="margin-top:20px"><details>' +
      '<summary>' + esc(tr("theoryTitle")) + '</summary>' + tr("theoryBody") + '</details></div>';
  }

  function prayer(time, name) {
    var m = Sleep.toMin(time);
    return '<div class="prayer"><div class="t">' + (isNaN(m) ? "—" : Sleep.fmt(m)) + '</div><div class="n">' + esc(name) + '</div></div>';
  }

  // ---- static text + language toggle ----------------------------------------
  function applyStaticText() {
    document.documentElement.lang = LANG;
    document.getElementById("appSub").textContent = tr("sub");
    document.getElementById("appFoot").textContent = tr("foot");
    [].forEach.call(document.querySelectorAll("#langToggle button"), function (btn) {
      btn.classList.toggle("active", btn.getAttribute("data-lang") === LANG);
    });
  }
  [].forEach.call(document.querySelectorAll("#langToggle button"), function (btn) {
    btn.onclick = function () {
      LANG = btn.getAttribute("data-lang");
      try { localStorage.setItem(LANG_KEY, LANG); } catch (e) {}
      applyStaticText();
      rerender();
    };
  });

  // ---- boot -----------------------------------------------------------------
  applyStaticText();
  if (loadSettings()) renderResult(); else renderSettings(true);
})();
</script>
</body>
</html>
